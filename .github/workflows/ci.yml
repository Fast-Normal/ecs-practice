name: Build & Push to ECR (Secrets with Account ID)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v3

      - name: JDK 17 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: gradle/actions/setup-gradle@v3

      - name: 빌드 및 테스트
        run: ./gradlew clean build

      - name: AWS CLI 설정
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

#      - name: S3 버킷 목록 출력
#        run: aws s3 ls
#
#      - name: DB_PASSWORD 시크릿 확인
#        run: |
#          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
#            echo "시크릿 값이 없습니다."
#            exit 1
#          else
#            echo "DB_PASSWORD 시크릿이 정상적으로 설정되었습니다."
#          fi
#
#      - name: 환경변수 테스트
#        run: |
#          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> $GITHUB_ENV
#          echo "API_KEY=${{ secrets.API_KEY }}" >> $GITHUB_ENV
#          echo "DB_PASSWORD 값은 숨김 처리되어 로그에는 보이지 않습니다."

      - name: ECR Login
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin \${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Prepare tags
        id: prep
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "REPO_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{secrets.AWS_REGION }}.amazonaws.com/my-app-repo" >> $GITHUB_ENV

      - name: Docker 빌드
        run: |
          docker build -t "$REPO_URI:$IMAGE_TAG" -t "$REPO_URI:latest" .

      - name: Docker push
        run: |
          docker push "$REPO_URI:$IMAGE_TAG"
          docker push "$REPO_URI:latest"

      - name: Render task definition
        run: |
          sudo apt-get update -y && sudo apt-get install -y gettext-base
          export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export AWS_REGION=${{ secrets.AWS_REGION }}
          export IMAGE_TAG=${{ env.IMAGE_TAG }}
          envsubst < ecs-task-def.json > task-def.rendered.json
          echo "=== Rendered task def ==="
          cat task-def.rendered.json

      - name: 작업 정의 업데이트
        run: |
          aws ecs register-task-definition \
          --cli-input-json file://ecs-task-def.json

      - name: ECS 서비스 업데이트
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment

      - name: ECS 배포 완료 대기
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE }}

      - name: ECS 배포 상태 확인
        run: |
          aws ecs describe-services \
            --cluster myapp-cluster \
            --services myapp-service \
            --query "services[0].deployments"